<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arnav Bakers | 100% Eggless Cakes</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(120deg,#fff0f5,#ffffff);
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  background:#fff;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
  position:sticky;
  top:0;
  z-index:100;
}

/* LOGO TEXT */
.brand{
  font-size:36px;
  font-weight:900;
  color:#e91e63;
  letter-spacing:2px;
}

/* HAMBURGER */
.menu-icon{
  font-size:26px;
  cursor:pointer;
}

/* MENU */
.menu{
  position:absolute;
  top:70px;
  right:20px;
  background:#fff;
  border-radius:10px;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
  display:none;
  overflow:hidden;
}
.menu a{
  display:block;
  padding:12px 20px;
  text-decoration:none;
  color:#333;
  font-weight:600;
}
.menu a:hover{
  background:#ffe4ec;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
}
.hero h2{
  font-size:40px;
  color:#e91e63;
  margin-bottom:10px;
}
.hero p{
  font-size:18px;
}

/* CAKES */
.cakes{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:30px;
}
.cakes img{
  width:250px;
  margin:12px;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

/* FOOTER */
footer{
  background:#000;
  color:#fff;
  text-align:center;
  padding:40px 20px;
}
footer h3{
  color:#e91e63;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25d366;
  color:#fff;
  font-size:30px;
  padding:15px 18px;
  border-radius:50%;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
  z-index:200;
}
</style>

<script>
function toggleMenu(){
  var menu=document.getElementById("menu");
  menu.style.display = menu.style.display==="block" ? "none":"block";
}
</script>

</head>
<body>

<header>
  <div class="brand">ARNAV BAKERS</div>

  <div class="menu-icon" onclick="toggleMenu()">
    <i class="fas fa-bars"></i>
  </div>

  <div class="menu" id="menu">
    <a href="#home">Home</a>
    <a href="#contact">Contact Us</a>
    <a href="#categories">Our Categories</a>
    <a href="#gallery">Gallery</a>
  </div>
</header>

<!-- HERO -->
<section class="hero" id="home">
  <h2>100% Eggless
