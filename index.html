<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arnav Bakers</title>

<style>
body{
  margin:0;
  font-family: 'Poppins', sans-serif;
}

/* ===== Header ===== */
header{
  background:#ff6f91;
  color:#fff;
  padding:20px;
  text-align:center;
}

/* ===== Categories ===== */
#categories{
  padding:40px 20px;
  text-align:center;
}

/* (Images removed as requested) */

/* ===== Gallery ===== */
.gallery{
  padding:50px 20px;
  background:#fff5f7;
  text-align:center;
}

.gallery h2{
  color:#d6336c;
  margin-bottom:30px;
}

.gallery-container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.gallery-container img{
  width:100%;
  height:250px;
  object-fit:cover;
  border-radius:15px;
  box-shadow:0 10px 20px rgba(0,0,0,0.15);
  transition:0.4s;
}

.gallery-container img:hover{
  transform:scale(1.08);
}

/* ===== Location ===== */
#location{
  padding:50px 20px;
  text-align:center;
}

#location h2{
  color:#d6336c;
  margin-bottom:20px;
}

/* ===== WhatsApp Button ===== */
.whatsapp-float{
  position:fixed;
  bottom:25px;
  right:25px;
  width:65px;
  height:65px;
  background:linear-gradient(135deg,#25d366,#128c7e);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  animation:pulse 1.8s infinite;
  z-index:1000;
}

.whatsapp-float img{
  width:35px;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.12);}
  100%{transform:scale(1);}
}
</style>
</head>

<body>

<header>
  <h1>Arnav Bakers</h1>
  <p>100% Pure Eggless Cake</p>
</header>

<!-- ===== Categories Section ===== -->
<section id="categories">
  <h2>Our Categories</h2>
  <p>Fresh • Eggless • Delicious Cakes</p>
</section>

<!-- ===== Gallery Section ===== -->
<section id="gallery" class="gallery">
  <h2>Our Cakes Gallery</h2>

  <div class="gallery-container">
    <img src="https://images.unsplash.com/photo-1601979031925-424e53b6caaa" alt="Pineapple Cake">
    <img src="https://images.unsplash.com/photo-1606890737304-57a1ca8a5b62" alt="Butterscotch Cake">
    <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587" alt="Chocolate Cake">
    <img src="https://images.unsplash.com/photo-1542826438-bd32f43d626f" alt="Vanilla Cake">
    <img src="https://images.unsplash.com/photo-1562440499-64c9a111f713" alt="Strawberry Cake">
    <img src="https://images.unsplash.com/photo-1621303837174-89787a7d4729" alt="Anniversary Cake">
    <img src="https://images.unsplash.com/photo-1623334044303-241021148842" alt="Cartoon Cake">
  </div>
</section>

<!-- ===== Location Section ===== -->
<section id="location">
  <h2>Visit Arnav Bakers</h2>

  <iframe 
    src="https://www.google.com/maps?q=Arnav%20Bakers&output=embed"
    width="100%"
    height="350"
    style="border-radius:15px;border:0;"
    loading="lazy">
  </iframe>
</section>

<!-- ===== WhatsApp Floating Button ===== -->
<a href="https://wa.me/918960128970" class="whatsapp-float" target="_blank">
  <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
</a>

</body>
</html>
